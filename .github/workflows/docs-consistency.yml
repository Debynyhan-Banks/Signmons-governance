name: docs-consistency

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-governance-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run docs consistency check
        run: node scripts/docs-consistency-check.mjs
